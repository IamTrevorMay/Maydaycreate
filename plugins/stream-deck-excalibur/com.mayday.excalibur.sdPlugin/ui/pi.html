<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Excalibur Command</title>
    <style>
      :root {
        --bg: #2d2d2d;
        --bg-input: #3b3b3b;
        --text: #d6d6d6;
        --text-muted: #999;
        --border: #4a4a4a;
        --accent: #0078d4;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        color: var(--text);
        background: var(--bg);
        padding: 12px;
      }
      .row {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }
      .row label {
        width: 80px;
        flex-shrink: 0;
        color: var(--text-muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .row .field { flex: 1; }
      select, input {
        width: 100%;
        padding: 6px 8px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-size: 12px;
        outline: none;
      }
      select:focus, input:focus {
        border-color: var(--accent);
      }
      .shortcut-badge {
        display: inline-block;
        padding: 3px 8px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: monospace;
        font-size: 11px;
        color: var(--text);
      }
      .shortcut-badge.none {
        color: #e8a33d;
        border-color: #e8a33d44;
      }
      .info {
        margin-top: 12px;
        padding: 8px 10px;
        background: #1e1e1e;
        border-radius: 4px;
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.5;
      }
      .refresh-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-muted);
        font-size: 11px;
        padding: 4px 10px;
        cursor: pointer;
        margin-left: 6px;
        flex-shrink: 0;
      }
      .refresh-btn:hover { border-color: var(--accent); color: var(--text); }
      optgroup { font-style: normal; font-weight: 600; color: var(--text-muted); }
    </style>
  </head>
  <body>
    <div class="row">
      <label>Command</label>
      <div class="field">
        <select id="commandSelect">
          <option value="">Loading commands…</option>
        </select>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh command list">↻</button>
    </div>

    <div class="info" id="infoBox">
      Select an Excalibur user command above. It will be executed directly
      in Premiere Pro via the Mayday server when you press this button.
    </div>

    <script>
      // ---------------------------------------------------------------
      // Stream Deck PI ↔ Plugin communication (SDK v6 WebSocket)
      // ---------------------------------------------------------------
      let websocket = null;
      let uuid = '';
      let actionInfo = {};
      let currentSettings = {};
      let allCommands = [];

      function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
        uuid = inPluginUUID;
        actionInfo = JSON.parse(inActionInfo);
        currentSettings = actionInfo.payload?.settings ?? {};

        websocket = new WebSocket('ws://127.0.0.1:' + inPort);

        websocket.onopen = function () {
          websocket.send(JSON.stringify({
            event: inRegisterEvent,
            uuid: inPluginUUID,
          }));

          // Request command list from plugin
          requestCommands();
        };

        websocket.onmessage = function (evt) {
          const msg = JSON.parse(evt.data);

          if (msg.event === 'sendToPropertyInspector') {
            handlePluginMessage(msg.payload);
          }

          if (msg.event === 'didReceiveSettings') {
            currentSettings = msg.payload?.settings ?? {};
            applySettingsToUI();
          }
        };
      }

      function sendToPlugin(payload) {
        if (!websocket) return;
        websocket.send(JSON.stringify({
          action: actionInfo.action,
          event: 'sendToPlugin',
          context: uuid,
          payload: payload,
        }));
      }

      function setSettings(settings) {
        if (!websocket) return;
        currentSettings = settings;
        websocket.send(JSON.stringify({
          event: 'setSettings',
          context: uuid,
          payload: settings,
        }));
      }

      // ---------------------------------------------------------------
      // Command handling
      // ---------------------------------------------------------------

      function requestCommands() {
        sendToPlugin({ event: 'getCommands' });
      }

      function handlePluginMessage(payload) {
        if (payload.event === 'commands') {
          allCommands = payload.commands || [];
          populateDropdown(allCommands);
          applySettingsToUI();
        }
      }

      function populateDropdown(commands) {
        const select = document.getElementById('commandSelect');
        select.innerHTML = '';

        if (commands.length === 0) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = 'No commands found';
          select.appendChild(opt);
          return;
        }

        // Group by category
        const groups = {};
        for (const cmd of commands) {
          const label = cmd.categoryLabel || cmd.category;
          if (!groups[label]) groups[label] = [];
          groups[label].push(cmd);
        }

        // Placeholder
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '— Select a command —';
        select.appendChild(placeholder);

        // Prioritize User Commands first
        const orderedLabels = Object.keys(groups).sort((a, b) => {
          if (a === 'User Commands') return -1;
          if (b === 'User Commands') return 1;
          return a.localeCompare(b);
        });

        for (const label of orderedLabels) {
          const optgroup = document.createElement('optgroup');
          optgroup.label = label;

          for (const cmd of groups[label].sort((a, b) => a.name.localeCompare(b.name))) {
            const opt = document.createElement('option');
            opt.value = cmd.id;
            const shortcutHint = cmd.shortcut ? ` [${formatShortcut(cmd.shortcut)}]` : '';
            opt.textContent = cmd.name + shortcutHint;
            optgroup.appendChild(opt);
          }

          select.appendChild(optgroup);
        }
      }

      function formatShortcut(shortcut) {
        if (!shortcut || !shortcut.key) return '';
        const modMap = {
          cmd: '⌘', command: '⌘',
          shift: '⇧', m: '⇧',
          alt: '⌥', option: '⌥',
          ctrl: '⌃', control: '⌃',
        };
        const mods = (shortcut.modifiers || [])
          .map(m => modMap[m.toLowerCase()] || m)
          .join('');
        return mods + shortcut.key.toUpperCase();
      }

      function applySettingsToUI() {
        const select = document.getElementById('commandSelect');
        const infoBox = document.getElementById('infoBox');

        if (currentSettings.commandId) {
          select.value = currentSettings.commandId;
        }

        if (currentSettings.commandName) {
          infoBox.textContent = `Pressing this button will execute "${currentSettings.commandName}" in Premiere Pro.`;
        } else {
          infoBox.textContent = 'Select an Excalibur user command above. It will be executed directly in Premiere Pro via the Mayday server when you press this button.';
        }
      }

      // ---------------------------------------------------------------
      // Event listeners
      // ---------------------------------------------------------------

      document.getElementById('commandSelect').addEventListener('change', function () {
        const selectedId = this.value;
        if (!selectedId) return;

        const cmd = allCommands.find(c => c.id === selectedId);
        if (!cmd) return;

        const settings = {
          commandId: cmd.id,
          commandName: cmd.name,
          category: cmd.category,
        };

        setSettings(settings);
        currentSettings = settings;
        applySettingsToUI();
      });

      document.getElementById('refreshBtn').addEventListener('click', function () {
        requestCommands();
      });
    </script>
  </body>
</html>
