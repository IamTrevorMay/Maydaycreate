name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner (arm64)
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all workspace packages
        run: npm run build

      - name: Validate signing secrets
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::error::MACOS_CERTIFICATE secret is empty"
            exit 1
          fi
          echo -n "$MACOS_CERTIFICATE" | base64 --decode > /tmp/test_cert.p12
          FILESIZE=$(stat -f%z /tmp/test_cert.p12)
          rm -f /tmp/test_cert.p12
          if [ "$FILESIZE" -lt 100 ]; then
            echo "::error::MACOS_CERTIFICATE is only $FILESIZE bytes — likely corrupted"
            exit 1
          fi
          echo "Certificate OK ($FILESIZE bytes)"
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}

      - name: Build and package Electron app (signing only, no notarize)
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd packages/launcher && npm run build && npx electron-builder --publish never

      - name: Notarize with xcrun notarytool
        run: |
          # Find the zip to notarize (Apple requires zip or dmg)
          ZIP_FILE=$(ls packages/launcher/release/*.zip | head -1)
          echo "Notarizing: $ZIP_FILE"

          xcrun notarytool submit "$ZIP_FILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "XF99392HXQ" \
            --wait --timeout 10m

          echo "Notarization complete"

          # Staple the DMG (stapling a zip isn't supported, but the DMG can be stapled)
          DMG_FILE=$(ls packages/launcher/release/*.dmg | head -1)
          if [ -n "$DMG_FILE" ]; then
            # Re-notarize the DMG too
            xcrun notarytool submit "$DMG_FILE" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "XF99392HXQ" \
              --wait --timeout 10m
            xcrun stapler staple "$DMG_FILE"
            echo "DMG stapled"
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            packages/launcher/release/*.dmg
            packages/launcher/release/*.zip
            packages/launcher/release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
