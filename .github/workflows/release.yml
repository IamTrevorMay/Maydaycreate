name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner (arm64)
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all workspace packages
        run: npm run build

      - name: Validate signing secrets exist
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::error::MACOS_CERTIFICATE secret is empty — set it in repo Settings → Secrets"
            exit 1
          fi
          # Quick sanity check: decode and verify it's a valid PKCS12
          echo -n "$MACOS_CERTIFICATE" | base64 --decode > /tmp/test_cert.p12
          FILESIZE=$(stat -f%z /tmp/test_cert.p12 2>/dev/null || stat -c%s /tmp/test_cert.p12)
          echo "Certificate file size: $FILESIZE bytes"
          if [ "$FILESIZE" -lt 100 ]; then
            echo "::error::MACOS_CERTIFICATE decoded to only $FILESIZE bytes — likely corrupted or truncated"
            exit 1
          fi
          rm -f /tmp/test_cert.p12
          echo "Certificate secret looks valid ($FILESIZE bytes)"
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}

      - name: Build and package Electron app
        env:
          # electron-builder handles code signing via these env vars
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # Notarization disabled for now — remove these to prevent electron-builder from attempting it
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: XF99392HXQ
        run: npm run package:launcher

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            packages/launcher/release/*.dmg
            packages/launcher/release/*.zip
            packages/launcher/release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
